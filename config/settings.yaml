# Глобальные настройки пайплайна и публикации.
# Чувствительные значения — в .env.

pipeline:
  # Минимальный приоритет источника, которые попадают в обработку (A > B > C > D)
  min_priority: B
  # Максимум постов за один цикл (защита от взрыва расходов)
  max_posts_per_cycle: 20
  # Сколько часов считаем пост "свежим" для дедупа/дополнений
  freshness_hours: 48
  # Жёстко не публиковать новости старше N часов
  max_age_hours: 24

triage:
  # Порог "интересности" 0-10 от cheap-judge
  min_score: 6
  # Сколько символов title+desc отдавать модели
  preview_chars: 600

summarize:
  # Лимит токенов на резюме (≈ 150 слов)
  max_tokens: 350
  # Стиль: краткий разговорный русский, без воды
  style: "Краткий разговорный русский, 3-6 предложений, без воды и маркетинга. Сначала суть, потом 1-2 ключевые детали."

addition:
  # Минимальная косинусная схожесть для рассмотрения как дополнение
  similarity_threshold: 0.82
  # Окно поиска похожих (часов)
  window_hours: 72

qa:
  # Лимит вопросов на пользователя в час
  rate_per_hour: 10
  # Длина ответа Q&A (токены)
  max_tokens: 300
  # Системный промпт
  system: "Ты — лаконичный технический ассистент. Отвечай на русском, опираясь ТОЛЬКО на контекст поста ниже. Если в контексте нет ответа — честно скажи, что не знаешь. 2-5 предложений."

moderation:
  # По умолчанию посты публикуются автоматически. true = всё в премодерацию.
  premoderate_all: false
  # Источники с этим флагом (см. sources.yaml: moderate: true) идут в премодерацию
  # Авто-safe для Q&A
  qa_safe: "privacy,secrets"

welcome:
  enabled: true
  # Сообщение приветствия. {name} — имя/упоминание зашедшего.
  text: "Привет, {name}! Добро пожаловать в ИИ Новости 🤖\nЛента — в темах форума, под постами можно задавать вопросы — отвечу с контекстом."
  # Через сколько секунд удалить приветствие
  delete_after_sec: 30

publish:
  # Шаблон подписи под постом со ссылкой на источник
  source_line: "🔗 Источник: {name} — {url}"
  addition_prefix: "➕ Дополнение к теме:"
